<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wallet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --accent-purple: #8A6BF5;
            --accent-purple-bg: rgba(138, 107, 245, 0.15);
            --nav-bg: rgba(20, 20, 20, 0.96);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, SF Pro Text, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding-top: var(--safe-top);
            padding-bottom: calc(90px + var(--safe-bottom));
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            height: 50px;
        }

        .avatar-wrap {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            background: #333;
        }

        .avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 17px;
            font-weight: 600;
        }

        .verify-icon {
            width: 16px;
            height: 16px;
            fill: var(--accent-purple);
        }

        .header-right {
            display: flex;
            gap: 16px;
            color: white;
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .tabs-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .segmented-control {
            background-color: #1C1C1E;
            border-radius: 20px;
            padding: 3px;
            display: flex;
        }

        .tab {
            padding: 6px 24px;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 600;
            color: #8E8E93;
        }

        .tab.active {
            background-color: #3A3A3C;
            color: white;
        }

        .balance-container {
            text-align: center;
            padding: 10px 0 30px 0;
        }

        .balance-label {
            color: #8E8E93;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .balance-value {
            font-size: 46px;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1;
        }

        .currency-symbol {
            font-size: 28px;
            color: #8E8E93;
            vertical-align: top;
            margin-left: 2px;
            position: relative;
            top: 4px;
        }

        .balance-sub {
            margin-top: 8px;
            font-size: 14px;
            color: #FF453A;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .sub-gray {
            color: #8E8E93;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 0 16px;
            margin-bottom: 24px;
        }

        .action-btn {
            background-color: #1C1C1E;
            border-radius: 14px;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-icon {
            width: 28px;
            height: 28px;
            background-color: var(--accent-purple-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-icon svg {
            width: 16px;
            height: 16px;
            fill: var(--accent-purple);
        }

        .action-text {
            font-size: 11px;
            font-weight: 500;
            color: white;
        }

        .banner {
            margin: 0 16px 24px 16px;
            background: linear-gradient(90deg, #FF9F0A, #FFD60A);
            border-radius: 14px;
            padding: 16px;
            position: relative;
            height: 80px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .banner-content {
            width: 75%;
            z-index: 2;
        }

        .banner-title {
            font-weight: 700;
            font-size: 15px;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .banner-link {
            font-size: 13px;
            opacity: 0.9;
        }

        .banner-close {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 20px;
            opacity: 0.7;
        }

        .banner-img {
            position: absolute;
            right: -10px;
            bottom: -10px;
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
        }

        .assets-list {
            padding: 0 16px;
        }

        .asset-item {
            background-color: #1C1C1E;
            border-radius: 16px;
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .asset-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .token-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: white;
        }

        .bg-green { background: #2DA562; }
        .bg-blue { background: #007AFF; }

        .token-name { font-size: 16px; font-weight: 600; }
        .token-sub { font-size: 13px; color: #8E8E93; margin-top: 2px; }

        .asset-right { text-align: right; }
        .asset-amount { font-size: 16px; font-weight: 600; }
        .asset-price { font-size: 13px; color: #8E8E93; margin-top: 2px; }
        .red { color: #FF453A; }

        .section-title {
            padding: 10px 20px 5px 20px;
            font-size: 13px;
            color: #8E8E93;
            display: flex;
            justify-content: space-between;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255,255,255,0.1);
            padding-bottom: var(--safe-bottom);
            height: calc(60px + var(--safe-bottom));
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            align-items: start;
            padding-top: 8px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #8E8E93;
            cursor: pointer;
        }

        .nav-icon {
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon svg {
            width: 24px;
            height: 24px;
            fill: #8E8E93;
        }

        .nav-label {
            font-size: 10px;
            font-weight: 500;
        }

        .nav-item.active .nav-label {
            color: var(--accent-purple);
        }

        .nav-item.active .nav-icon {
            width: 48px;
            background-color: rgba(138, 107, 245, 0.2);
            border-radius: 20px;
        }

        .nav-item.active svg {
            fill: var(--accent-purple);
        }

    </style>
</head>
<body>

    <div class="header">

                <svg viewBox="0 0 24 24"><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>

    <div class="tabs-wrapper">
        <div class="segmented-control">
            <div class="tab active">Крипто</div>
            <div class="tab">TON</div>
        </div>
    </div>

    <div class="balance-container">

            1 000,02 <span class="currency-symbol">$</span>

        </div>
        <div class="action-btn">
            <div class="action-icon">
                <svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg>
            </div>
            <div class="action-text">Вывести</div>
        </div>
        <div class="action-btn">
            <div class="action-icon">
                <svg viewBox="0 0 24 24"><path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/></svg>
            </div>
            <div class="action-text">Обменять</div>
        </div>
    </div>

    <div class="banner">
        <div class="banner-close">×</div>
        <div class="banner-content">
            <div class="banner-title">Зарабатывайте до 25% годовых на ADI</div>
            <div class="banner-link">Начать зарабатывать ›</div>
        </div>
        <div class="banner-img"></div>
    </div>

    <div class="assets-list">
        <div class="asset-item">
            <div class="asset-left">
                <div class="token-icon bg-green">
                    <svg style="width:24px;height:24px;fill:white" viewBox="0 0 24 24"><path d="M5 4h14v2h-6v14h-2V6H5V4z"/></svg>
                </div>
                <div>
                    <div class="token-name">Доллары</div>
                    <div class="token-sub">USDT</div>
                </div>
            </div>
            <div class="asset-right">
                <div class="asset-amount">1 000,00 $</div>
            </div>
        </div>
    </div>

    <div class="section-title">
        <span>Крипто</span>
        <span>Всего: 0,02 $</span>

    <div class="assets-list">
        <div class="asset-item">
            <div class="asset-left">

                    <svg style="width:20px;height:20px;fill:white" viewBox="0 0 24 24"><path d="M12,2L4.5,7.6L12,22L19.5,7.6L12,2Z"/></svg>

                <div>
                    <div class="token-name">Toncoin</div>

            </div>
            <div class="asset-right">
                <div class="asset-amount">0,02 $</div>
                <div class="asset-price red">&lt;0,01 $</div>

        </div>
        <div class="nav-item">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            </div>

        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');
        tg.setBackgroundColor('#000000');
    </script>
</body>
</html>
