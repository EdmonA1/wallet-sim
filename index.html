<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wallet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-secondary-bg-color, #f2f2f7);
            --section-bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #8e8e93);
            --button-color: #007AFF; 
            --button-text-color: #ffffff;
            --separator-color: rgba(60, 60, 67, 0.29);
            --tab-bg: rgba(255, 255, 255, 0.85);
            --tab-active: #007AFF;
            --tab-inactive: #999999;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: var(--tg-theme-secondary-bg-color, #000000);
                --section-bg-color: var(--tg-theme-bg-color, #1c1c1e);
                --text-color: var(--tg-theme-text-color, #ffffff);
                --hint-color: var(--tg-theme-hint-color, #ebebf599);
                --separator-color: rgba(84, 84, 88, 0.65);
                --tab-bg: rgba(30, 30, 30, 0.85);
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
            user-select: none;
            -webkit-user-select: none;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(16px + env(safe-area-inset-top)) 16px 16px 16px;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.4px;
            background-color: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .header svg {
            width: 20px;
            height: 20px;
            margin-right: 6px;
        }

        .balance-container {
            text-align: center;
            padding: 24px 16px;
        }

        .balance-amount {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .balance-subtitle {
            font-size: 15px;
            color: var(--hint-color);
            font-weight: 400;
        }

        .actions-row {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-bottom: 32px;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .action-button {
            width: 52px;
            height: 52px;
            background-color: var(--button-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--button-text-color);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        .action-button svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .action-item span {
            font-size: 13px;
            font-weight: 500;
            color: var(--button-color);
        }

        .assets-card {
            background-color: var(--section-bg-color);
            border-radius: 16px;
            margin: 0 16px;
            padding: 0 16px;
        }

        .asset-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 0.5px solid var(--separator-color);
        }

        .asset-row:last-child {
            border-bottom: none;
        }

        .asset-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .asset-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--bg-color);
            object-fit: cover;
        }

        .asset-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .asset-name {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .asset-badge {
            font-size: 13px;
            color: var(--hint-color);
        }

        .asset-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .asset-balance {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .asset-fiat {
            font-size: 13px;
            color: var(--hint-color);
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(56px + env(safe-area-inset-bottom));
            background: var(--tab-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--separator-color);
            display: flex;
            justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 25%;
            padding-top: 6px;
            color: var(--tab-inactive);
        }

        .tab-item.active {
            color: var(--tab-active);
        }

        .tab-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 2px;
            fill: currentColor;
        }

        .tab-item span {
            font-size: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="header">
        <svg viewBox="0 0 24 24" fill="var(--button-color)"><path d="M19 7h-1V6a3 3 0 0 0-3-3H5a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3v-8a3 3 0 0 0-3-3zm-1 9h-2a1 1 0 1 1 0-2h2v2z"/></svg>
        Wallet
    </div>

    <div class="balance-container">
        <div class="balance-amount">$1,000.00</div>
        <div class="balance-subtitle">~154.2 TON</div>
    </div>

    <div class="actions-row">
        <div class="action-item">
            <div class="action-button">
                <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke-width="2.5"/></svg>
            </div>
            <span>Send</span>
        </div>
        <div class="action-item">
            <div class="action-button">
                <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-width="2.5"/></svg>
            </div>
            <span>Add</span>
        </div>
        <div class="action-item">
            <div class="action-button">
                <svg viewBox="0 0 24 24"><path d="M17 4v11m0 0l-4-4m4 4l4-4M7 20V9m0 0l4 4m-4-4l-4 4" stroke-width="2.5"/></svg>
            </div>
            <span>Exchange</span>
        </div>
    </div>

    <div class="assets-card">
        <div class="asset-row">
            <div class="asset-left">
                <img src="https://cryptologos.cc/logos/toncoin-ton-logo.svg?v=035" class="asset-icon" alt="TON">
                <div class="asset-info">
                    <span class="asset-name">TON Space</span>
                    <span class="asset-badge">Beta</span>
                </div>
            </div>
            <div class="asset-right">
                <span class="asset-balance">150.00 TON</span>
                <span class="asset-fiat">$972.50</span>
            </div>
        </div>
        <div class="asset-row">
            <div class="asset-left">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.svg?v=035" class="asset-icon" alt="USDT">
                <div class="asset-info">
                    <span class="asset-name">Tether</span>
                    <span class="asset-badge">USDT</span>
                </div>
            </div>
            <div class="asset-right">
                <span class="asset-balance">25.00 USDT</span>
                <span class="asset-fiat">$25.00</span>
            </div>
        </div>
        <!-- Bitcoin -->
        <div class="asset-row">
            <div class="asset-left">
                <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=035" class="asset-icon" alt="BTC">
                <div class="asset-info">
                    <span class="asset-name">Bitcoin</span>
                    <span class="asset-badge">BTC</span>
                </div>
            </div>
            <div class="asset-right">
                <span class="asset-balance">0.000038 BTC</span>
                <span class="asset-fiat">$2.50</span>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active">
            <svg viewBox="0 0 24 24"><path d="M21 7.5H3a1.5 1.5 0 0 0-1.5 1.5v9A1.5 1.5 0 0 0 3 19.5h18a1.5 1.5 0 0 0 1.5-1.5V9a1.5 1.5 0 0 0-1.5-1.5zm-3.5 6a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zM20 4.5H4a1 1 0 0 1 0-2h16a1 1 0 0 1 0 2z"/></svg>
            <span>Wallet</span>
        </div>
        <div class="tab-item">
            <svg viewBox="0 0 24 24"><path d="M4 4h6v6H4zm10 0h6v6h-6zM4 14h6v6H4zm10 0h6v6h-6z"/></svg>
            <span>Assets</span>
        </div>
        <div class="tab-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
            <span>Trade</span>
        </div>
        <div class="tab-item">
            <svg viewBox="0 0 24 24"><path d="M19.4 13c.08-.63.14-1.27.14-1.92 0-.66-.06-1.3-.15-1.92l2.1-1.63a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.61-.22l-2.49 1a9.23 9.23 0 0 0-3.33-1.93l-.38-2.65A.5.5 0 0 0 12.31 0H8.3a.5.5 0 0 0-.49.43L7.42 3.1A9.12 9.12 0 0 0 4.1 5.02l-2.5-1a.5.5 0 0 0-.61.22l-2 3.46a.5.5 0 0 0 .12.64l2.11 1.64c-.09.62-.15 1.26-.15 1.92 0 .66.06 1.3.15 1.92l-2.11 1.64a.5.5 0 0 0-.12.64l2 3.46a.5.5 0 0 0 .61.22l2.49-1a9.2 9.2 0 0 0 3.33 1.93l.38 2.65a.5.5 0 0 0 .49.43h4.02a.5.5 0 0 0 .49-.43l.38-2.65a9.1 9.1 0 0 0 3.33-1.93l2.49 1a.5.5 0 0 0 .61-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.1-1.64zM10.3 15.5a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9z"/></svg>
            <span>Settings</span>
        </div>
    </div>

    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.expand();
            window.Telegram.WebApp.ready();
            
            const tg = window.Telegram.WebApp;
            if (tg.setHeaderColor) {
                tg.setHeaderColor('secondary_bg_color');
            }
        }
    </script>
</body>
</html>
